<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICF Canoe Polo Rules 2025</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="rules.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">Canoe Polo Rules Quiz</a>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="signals.html">Signals</a>
        <a href="rules.html" class="active">Rules</a>
      </nav>
    </div>
  </header>

  <main class="rules-main">
    <div class="rules-sidebar" id="rulesSidebar">
      <div class="sidebar-header">
        <h2>Chapters</h2>
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">&#9776;</button>
      </div>
      <nav class="chapter-nav" id="chapterNav" aria-label="Rules navigation">
        <p class="nav-loading" id="navLoading">Loading&hellip;</p>
      </nav>
    </div>

    <div class="rules-content" id="rulesContent">
      <p class="content-loading" id="contentLoading">Loading rules&hellip;</p>
      <div id="rulesBody" class="rules-body" hidden></div>
    </div>
  </main>

  <!-- Mobile drill-down navigation (shown only on portrait mobile via CSS) -->
  <div id="mobileView" hidden>

    <div id="mobileChapterList">
      <p class="mobile-loading" id="mobileLoading">Loading&hellip;</p>
    </div>

    <div id="mobileSectionList" hidden>
      <div class="mobile-nav-bar">
        <button class="mobile-back-btn" id="mobileBackToChapters">&#8592; Chapters</button>
        <h2 class="mobile-chapter-heading" id="mobileChapterHeading"></h2>
      </div>
      <ul class="mobile-section-list" id="mobileSectionItems"></ul>
    </div>

    <div id="mobileRuleView" hidden>
      <div class="mobile-nav-bar">
        <button class="mobile-back-btn" id="mobileBackToSections">&#8592; <span id="mobileBackChapterName"></span></button>
        <h2 class="mobile-chapter-heading" id="mobileRuleHeading"></h2>
      </div>
      <div id="mobileRuleContent" class="mobile-rule-content"></div>
    </div>

  </div>

  <script src="rules.js"></script>
</body>
</html>
