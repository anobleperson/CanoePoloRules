<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#005b8e"/>

  <!-- Kayak / water line -->
  <ellipse cx="32" cy="58" rx="22" ry="5" fill="#c0392b"/>
  <rect x="10" y="54" width="44" height="6" rx="3" fill="#c0392b"/>

  <!-- Body / torso -->
  <rect x="21" y="38" width="22" height="18" rx="4" fill="#1a2c4e"/>
  <!-- White bib -->
  <rect x="24" y="39" width="16" height="14" rx="3" fill="white"/>
  <!-- Number 3 on bib -->
  <text x="32" y="50" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="10" font-weight="900" fill="#005b8e">3</text>

  <!-- Neck -->
  <rect x="28" y="30" width="8" height="10" rx="2" fill="#d4956a"/>

  <!-- Helmet -->
  <ellipse cx="32" cy="22" rx="13" ry="12" fill="white"/>
  <rect x="19" y="22" width="26" height="8" rx="2" fill="white"/>

  <!-- Helmet chin strap area -->
  <rect x="24" y="29" width="16" height="3" rx="1" fill="#cccccc"/>

  <!-- Face guard cage (vertical bars) -->
  <g stroke="#888" stroke-width="1.2" fill="none">
    <line x1="25" y1="24" x2="25" y2="31"/>
    <line x1="29" y1="23" x2="29" y2="32"/>
    <line x1="33" y1="23" x2="33" y2="32"/>
    <line x1="37" y1="24" x2="37" y2="31"/>
    <!-- horizontal bars -->
    <line x1="23" y1="26" x2="39" y2="26"/>
    <line x1="22" y1="29" x2="40" y2="29"/>
    <!-- outer cage frame -->
    <path d="M22 24 Q21 27 22 31" stroke-width="1.5"/>
    <path d="M40 24 Q41 27 40 31" stroke-width="1.5"/>
    <line x1="22" y1="24" x2="40" y2="24"/>
    <line x1="22" y1="31" x2="40" y2="31"/>
  </g>

  <!-- Arm raised holding ball -->
  <path d="M38 36 Q46 30 48 20" stroke="#d4956a" stroke-width="6" stroke-linecap="round" fill="none"/>

  <!-- Ball (red & yellow water polo ball) -->
  <circle cx="48" cy="16" r="8" fill="#e74c3c"/>
  <!-- Ball panels -->
  <path d="M41 13 Q48 8 55 13" stroke="#f1c40f" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M40 17 Q48 22 56 17" stroke="#f1c40f" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M44 9 Q44 16 44 23" stroke="#f1c40f" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M52 9 Q52 16 52 23" stroke="#f1c40f" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Paddle (horizontal, dark) -->
  <rect x="8" y="47" width="48" height="4" rx="2" fill="#1a1a2e"/>
  <!-- Paddle blades -->
  <ellipse cx="10" cy="49" rx="6" ry="4" fill="#2c2c54" transform="rotate(-15 10 49)"/>
  <ellipse cx="54" cy="49" rx="6" ry="4" fill="#2c2c54" transform="rotate(15 54 49)"/>
</svg>
